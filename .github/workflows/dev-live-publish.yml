name: Build and Publish Production Docker Image to GHCR

on:
  push:
    branches:
      - main
    paths-ignore:
      - '*.md'
      - '.vscode/**'
      - 'docs/**'

concurrency:
  group: live-publish-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to the GitHub Container Registry (GHCR)
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Downcase repository name for Docker image tag
        id: string
        run: |
          echo "repo_lowercase=$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_OUTPUT

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./docker/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ steps.string.outputs.repo_lowercase }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push Sync Worker Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./services/sync-worker/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ steps.string.outputs.repo_lowercase }}-firebase-bridge:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
