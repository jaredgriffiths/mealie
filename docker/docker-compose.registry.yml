services:
  registry:
    image: registry:2
    container_name: lan-docker-registry
    restart: always
    ports:
      - "5000:5000"
    environment:
      REGISTRY_STORAGE_FILESYSTEM_ROOTDIRECTORY: /var/lib/registry
    volumes:
      - registry-data:/var/lib/registry

volumes:
  registry-data:
    driver: local
